spring.application.name=demo

# ログレベル設定
# =========================================================================
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.springframework=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} [%X{requestId}] - %msg%n

# RDB設定
# =========================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/mydb?serverTimezone=UTC
spring.datasource.username=admin
spring.datasource.password=2suT5EatVd7gzCD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis設定
# =========================================================================
# MyBatis の自動キャメルケース変換
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.example.demo.ex0001.entity

# Request ID header name for RequestTimingFilter (default: X-Request-ID)
base.request-id-header=X-Request-ID
base.error-request-savepath=C:/temp/error-request

# JWT settings
security.jwt.secret=change-me-secret-key-change-me-secret-key-1234567890
security.jwt.expiration.access=3600000
security.jwt.expiration.refresh=86400000
security.jwt.issue-refresh-token=true

# OAuth2/OpenID config
security.issuer=http://localhost:8080
security.oauth2.token-endpoint=/oauth/token
